CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Faster BLE connection interval — drastically reduces split-link latency
# (default min is 24 = 30ms; 6 = 7.5ms, the fastest BLE permits). Costs a bit
# of battery but eliminates the laggy-right-side feel.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Sleep configuration — deep-sleep after 5 minutes idle
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# ZMK Studio support (runtime keymap editing)
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# USB support
CONFIG_ZMK_USB=y

# BLE support
CONFIG_ZMK_BLE=y

# Mouse / pointing support (for &mkp and mouse movement on the MOUSE layer)
CONFIG_ZMK_POINTING=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep configuration — deep-sleep after 5 minutes idle
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# ZMK Studio support (runtime keymap editing)
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# USB support
CONFIG_ZMK_USB=y

# BLE support
CONFIG_ZMK_BLE=y

# Mouse / pointing support (for &mkp and mouse movement on the MOUSE layer)
CONFIG_ZMK_POINTING=y
